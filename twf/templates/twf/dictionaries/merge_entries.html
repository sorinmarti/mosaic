{% extends 'twf/base/base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="card">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Merge Dictionary Entries</h5>
        </div>
        <div class="card-body">
            <p class="text-muted mb-3">Select the dictionary entries to merge. The left entry will remain, and the right entry will be merged into it.</p>
            {% crispy form %}
        </div>
    </div>
{% endblock %}
