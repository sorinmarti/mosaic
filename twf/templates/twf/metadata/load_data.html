{% extends 'twf/base/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="card">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Load JSON Metadata</h5>
        </div>
        <div class="card-body">
            <p class="text-muted mb-3">Load metadata from a JSON file to your page or document objects.</p>
            {% crispy form %}
        </div>
    </div>
{% endblock %}
